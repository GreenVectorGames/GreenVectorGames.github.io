<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Green Vector Games</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>

<body>
  <header class="wrap row">
    <div class="brand">
      <span class="brand-logo">🎮</span>
      Green Vector Games
    </div>
    <nav>
      <a href="#released">Released</a>
      <a href="#upcoming">Upcoming</a>
    </nav>
  </header>

  <main class="wrap">
    <section id="games">
      <div class="company-info">
        <p id="companyDescription"></p>
        <div class="social-links" id="socialLinks"></div>
      </div>
      <h2>Games</h2>
      <p class="presskit-note">Click on any game below to access its Presskit.</p>
      <ul id="gamesList"></ul>
    </section>

    <section id="upcoming">
      <h2>Upcoming Games</h2>
      <iframe src="https://store.steampowered.com/widget/3636520/" frameborder="0" width="100%" height="190"></iframe>
      <ul id="upcomingList"></ul>
    </section>
  </main>
</body>

</html>
